resources:
  pipelines:
    bronze_pharma_pipeline:
      name: bronze_pharma_pipeline
      catalog: ${var.catalog}
      schema: ${var.bronze_schema}
      serverless: true
      root_path: ../src/bronze_pharma_pipeline
      configuration:
        catalog: ${var.catalog}
        bronze_schema: ${var.bronze_schema}
        silver_schema: ${var.silver_schema}
        gold_schema: ${var.gold_schema}
      libraries:
        - glob:
            include: ../src/bronze_pharma_pipeline/transformations/**
